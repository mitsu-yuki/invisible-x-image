<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Invisible X Image</title>
    <style>
      body {
        margin: 0;
        width: 240px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #0f1419;
      }
      main {
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 12px;
      }
      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        font-size: 13px;
        cursor: pointer;
      }
      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Invisible X Image</h1>
      <label>
        Hide images
        <input type="checkbox" id="hide-images" />
      </label>
      <label>
        Hide videos
        <input type="checkbox" id="hide-videos" />
      </label>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
